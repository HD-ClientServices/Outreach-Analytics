<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Outreach Analytics · Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* Tokens from Intro's design system (tryintro.com) */
:root{
  --background:#ffffff; --surface:#fdfcfc; --card:#f5f3f1; --card-2:#efece8;
  --foreground:#171717; --muted:rgba(0,0,0,.6); --muted-2:rgba(0,0,0,.45);
  --border:#e5e7eb; --border-side:rgba(0,0,0,.05);
  --accent:#000000; --accent-fg:#ffffff; --highlight:#fef8d4;
  --green:#16a34a; --danger:#dc2626;
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --radius:12px; --radius-lg:24px; --container:1152px;
}
*{box-sizing:border-box}
body{margin:0;background:var(--surface);color:var(--foreground);font-family:var(--font-sans);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:var(--container);margin:0 auto;padding:44px 24px 80px}
h1{font-size:43px;font-weight:300;margin:0;letter-spacing:-.03em;line-height:1.08}
h1 em{font-style:italic;background:var(--highlight);padding:0 .12em;border-radius:3px}
.sub{font-size:15px;color:var(--muted);margin-top:10px}
.stamp{font-size:12.5px;color:var(--muted-2);margin-top:6px;font-family:var(--font-mono)}
.note{background:var(--highlight);border:1px solid rgba(0,0,0,.06);padding:14px 18px;border-radius:var(--radius);font-size:13px;line-height:1.55;margin:22px 0 0}
.note code{font-family:var(--font-mono);font-size:12px}
.sec{margin-top:40px}
.sec h2{font-size:19px;font-weight:500;letter-spacing:-.02em;margin:0 0 3px}
.sec .h{font-size:13px;color:var(--muted-2);margin-bottom:16px}
.card{background:var(--background);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-2);font-weight:500;padding:14px 20px;border-bottom:1px solid var(--border)}
td{padding:15px 20px;border-bottom:1px solid var(--border-side);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--surface)}
.num{text-align:right;font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:13.5px}
.seqname{font-weight:500;font-size:14.5px;letter-spacing:-.01em}
.crcell{display:flex;align-items:center;gap:12px}
.crval{font-family:var(--font-mono);font-weight:700;font-size:14px;min-width:54px;text-align:right;font-variant-numeric:tabular-nums}
.track{flex:1;height:8px;border-radius:4px;background:var(--card-2);overflow:hidden;min-width:70px}
.fill{height:100%;border-radius:4px;background:var(--green);transition:width .45s ease}
.pos{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 7px;border-radius:7px;background:var(--card);font-family:var(--font-mono);font-size:12px;font-weight:500}
.frase{line-height:1.5;font-size:13.5px;max-width:560px}
.controls{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.grp{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-2);font-weight:500;margin-right:3px}
.pill{padding:7px 15px;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--background);color:var(--muted);user-select:none;transition:all .15s}
.pill:hover{border-color:rgba(0,0,0,.25);color:var(--foreground)}
.pill.on{background:var(--accent);border-color:var(--accent);color:var(--accent-fg)}
.nd{color:var(--muted-2);font-family:var(--font-mono)}
.chip{font-size:10.5px;padding:2px 8px;border-radius:999px;background:var(--card);color:var(--muted-2);font-weight:500;margin-left:8px;white-space:nowrap}
.foot{margin-top:44px;font-size:12px;color:var(--muted-2);text-align:center;line-height:1.7}
.spin{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--foreground);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px;margin-right:7px}
@keyframes sp{to{transform:rotate(360deg)}}
</style></head>
<body><div class="wrap">
<h1>Outreach <em>analytics</em>.</h1>
<div class="sub">Performance by sequence · Live transfers ÷ contacts entered</div>
<div class="stamp" id="stamp"></div>
<div id="app"><div class="sub" style="margin-top:36px"><span class="spin"></span>Loading…</div></div>
<div class="foot" id="foot"></div>
</div>
<script>
var EP="https://ouszjnrkawvrwxjjgrxx.supabase.co/functions/v1/outreach-analytics";
var TOKEN=new URLSearchParams(location.search).get("token")||"";
var DATA=null;
var ORDER=["cc","cold","defdec"];
var ST={win:30, tab:"cc", sort:"pos", metric:"reply"};

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}
function nf(v){return v==null?'<span class="nd">—</span>':v.toLocaleString("en-US")}
function ago(iso){if(!iso)return"";var h=(Date.now()-new Date(iso).getTime())/3600000;
  if(h<1)return Math.round(h*60)+" min";if(h<48)return Math.round(h)+" h";return Math.round(h/24)+" d"}
function bar(v,mx,col){
  if(v==null)return '<div class="crcell"><span class="crval nd">—</span><div class="track"></div></div>';
  return '<div class="crcell"><span class="crval">'+v+'%</span><div class="track"><div class="fill" style="width:'
    +Math.max(mx?v/mx*100:0,3)+'%'+(col?';background:'+col:'')+'"></div></div></div>';
}
function W(){return (DATA&&DATA.windows&&DATA.windows[ST.win])||null}
function metricOf(m){return ST.metric==="reply"?m.replyRate:ST.metric==="lt"?m.ltRate:m.dndRate}
function countOf(m){return ST.metric==="reply"?m.replies:ST.metric==="lt"?m.lts:m.dnds}
function metricName(){return ST.metric==="reply"?"Responses":ST.metric==="lt"?"Live transfers":"DNDs"}
// Real sequence name (the exact GHL workflow label), used in the table AND the tabs.
function seqName(k){
  var w=W(); if(w){var s=(w.sequences||[]).filter(function(x){return x.key==k})[0]; if(s&&s.label) return s.label;}
  return k;
}

function render(){
  var w=W(); if(!w){document.getElementById("app").innerHTML='<div class="note">No data for this window.</div>';return}
  var H="";
  H+='<div class="controls" style="margin-top:22px"><div class="grp"><span class="lbl">Window</span><div class="grp" id="wins"></div></div></div>';
  H+='<div class="sec"><h2>Overall performance × sequence</h2><div class="h">LT ÷ contacts entered · sorted by conversion rate</div>'
   + '<div class="card"><table><thead><tr><th style="width:300px">Sequence</th><th class="num" style="width:80px">LT</th>'
   + '<th class="num" style="width:160px">Contacts entered</th><th>Conversion rate to live transfer</th></tr></thead><tbody id="t1"></tbody></table></div></div>';
  H+='<div class="sec"><h2>Messages</h2><div class="h" id="msgh"></div>'
   + '<div class="controls" style="margin-bottom:14px">'
   + '<div class="grp"><span class="lbl">Metric</span><div class="grp" id="metrics"></div></div>'
   + '<div class="grp"><span class="lbl">Sort</span><div class="grp" id="sorts"></div></div></div>'
   + '<div class="controls" style="margin-bottom:16px"><div class="grp"><span class="lbl">Sequence</span><div class="grp" id="tabs"></div></div></div>'
   + '<div class="card"><table><thead><tr><th class="num" style="width:66px">SMS #</th><th>Message</th>'
   + '<th class="num" style="width:80px">Sent</th><th class="num" style="width:120px" id="cnth">Responses</th>'
   + '<th style="width:180px" id="crh">Response rate</th></tr></thead><tbody id="t2"></tbody></table></div></div>';
  document.getElementById("app").innerHTML=H;
  wins();t1();pills();t2();
  document.getElementById("stamp").textContent="Data from "+ago(DATA.snapshotAt||DATA.generatedAt)+" ago · "+ST.win+"-day window";
  var u=w.unidentified||{ing:0,lt:0};
  document.getElementById("foot").innerHTML="Source: GoHighLevel API v2 (read-only) · sms_analytics schema<br>"
    +"Outside the 3 sequences: "+nf(u.ing)+" contacts · "+nf(u.lt)+" LT (other workflows or manual sends)";
}
function wins(){document.getElementById("wins").innerHTML=[7,14,30].map(function(x){
  return '<span class="pill'+(ST.win==x?' on':'')+'" onclick="ST.win='+x+';render()">'+x+' days</span>'}).join("")}
function t1(){
  var rows=(W().sequences||[]).slice().sort(function(a,b){return (b.cr==null?-1:b.cr)-(a.cr==null?-1:a.cr)});
  var mx=Math.max.apply(null,rows.map(function(r){return r.cr||0}).concat([1]));
  document.getElementById("t1").innerHTML=rows.map(function(s){
    var small=s.ing!=null&&s.ing<50?'<span class="chip">small sample</span>':'';
    return '<tr><td><div class="seqname">'+esc(s.label)+small+'</div></td>'
      +'<td class="num">'+nf(s.lt)+'</td><td class="num">'+nf(s.ing)+'</td><td>'+bar(s.cr,mx)+'</td></tr>';
  }).join("")||'<tr><td colspan="4" class="nd" style="padding:20px">No data.</td></tr>';
}
function pills(){
  document.getElementById("metrics").innerHTML=
    '<span class="pill'+(ST.metric=="reply"?' on':'')+'" onclick="ST.metric=\'reply\';pills();t2()">Responses</span>'
   +'<span class="pill'+(ST.metric=="lt"?' on':'')+'" onclick="ST.metric=\'lt\';pills();t2()">Live transfers</span>'
   +'<span class="pill'+(ST.metric=="dnd"?' on':'')+'" onclick="ST.metric=\'dnd\';pills();t2()">DND</span>';
  document.getElementById("sorts").innerHTML=
    '<span class="pill'+(ST.sort=="pos"?' on':'')+'" onclick="ST.sort=\'pos\';pills();t2()">Position</span>'
   +'<span class="pill'+(ST.sort=="cr"?' on':'')+'" onclick="ST.sort=\'cr\';pills();t2()">Conversion</span>';
  document.getElementById("tabs").innerHTML=ORDER.map(function(k){
    return '<span class="pill'+(ST.tab==k?' on':'')+'" onclick="ST.tab=\''+k+'\';pills();t2()">'+esc(seqName(k))+'</span>'}).join("");
}
function t2(){
  var w=W(), rows=((w.msgs||{})[ST.tab]||[]).slice();
  if(ST.sort=="pos") rows.sort(function(a,b){return a.pos-b.pos});
  else rows.sort(function(a,b){return metricOf(b)-metricOf(a)});
  var mx=Math.max.apply(null,rows.map(metricOf).concat([0.0001]));
  document.getElementById("cnth").textContent = metricName();
  document.getElementById("crh").textContent = ST.metric=="reply" ? "Response rate" : ST.metric=="lt" ? "Live transfer rate" : "DND rate";
  document.getElementById("msgh").textContent = ST.metric=="reply"
    ? "Which message hooks: of every 100 times it was sent, how many got a reply. Only messages with 5+ sends."
    : ST.metric=="lt"
    ? "Of every 100 times it was sent, how many ended in a live transfer. Only messages with 5+ sends."
    : "Which message burns the list: of every 100 times it was sent, how many opted out (DND). Lower is better. Only messages with 5+ sends.";
  document.getElementById("t2").innerHTML=rows.map(function(m){
    return '<tr><td class="num"><span class="pos">'+m.pos+'</span></td>'
      +'<td><div class="frase">'+esc(m.tmpl)+'</div></td>'
      +'<td class="num">'+nf(m.sends)+'</td>'
      +'<td class="num">'+nf(countOf(m))+'</td>'
      +'<td>'+bar(metricOf(m),mx,ST.metric=="dnd"?"var(--danger)":null)+'</td></tr>';
  }).join("")||'<tr><td colspan="5" class="nd" style="padding:20px">No messages with 5+ sends in this window.</td></tr>';
}
fetch(EP+"?action=data&token="+encodeURIComponent(TOKEN))
  .then(function(r){return r.json()})
  .then(function(d){
    if(d.error){document.getElementById("app").innerHTML='<div class="note">Unauthorized. Check the token in the link.</div>';return}
    if(d.empty){document.getElementById("app").innerHTML='<div class="note">No data yet: the extraction hasn\'t finished.</div>';return}
    DATA=d;render();
  })
  .catch(function(e){document.getElementById("app").innerHTML='<div class="note">Error loading data: '+esc(String(e))+'</div>'});
</script></body></html>
